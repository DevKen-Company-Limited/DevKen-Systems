<div class="absolute inset-0 flex min-w-0 flex-col overflow-y-auto" cdkScrollable>

  <!-- Page Header -->
  <app-page-header
    title="Book Reservations"
    description="Track and manage all book reservation requests"
    icon="bookmark"
    [breadcrumbs]="breadcrumbs"
    [actionTemplate]="headerActions">
  </app-page-header>

  <ng-template #headerActions>
    <button mat-flat-button
      class="bg-white text-teal-700 hover:bg-teal-50 hover:text-teal-900 shadow-lg transition-all hover:shadow-xl font-bold"
      (click)="openCreate()">
      <mat-icon class="icon-size-5">add</mat-icon>
      <span class="ml-2">New Reservation</span>
    </button>
  </ng-template>

  <!-- Main Content -->
  <div class="bg-card -mt-10 flex-auto rounded-t-2xl p-6 shadow sm:p-10">

    <app-stats-cards [cards]="statsCards" [columns]="4"></app-stats-cards>

    <div class="mb-6">
      <app-filter-panel
        [fields]="filterFields"
        [showPanel]="showFilterPanel"
        [columns]="3"
        (filterChange)="onFilterChange($event)"
        (clearAll)="onClearFilters()"
        (togglePanel)="toggleFilterPanel()">
      </app-filter-panel>
    </div>

    <app-data-table
      [columns]="tableColumns"
      [data]="paginatedData"
      [actions]="tableActions"
      [loading]="isLoading"
      [header]="tableHeader"
      [emptyState]="tableEmptyState"
      [cellTemplates]="cellTemplates">
    </app-data-table>

    <app-pagination
      *ngIf="!isLoading"
      [currentPage]="currentPage"
      [totalItems]="filteredData.length"
      [itemsPerPage]="itemsPerPage"
      [itemLabel]="'reservations'"
      [showItemsPerPageSelector]="true"
      [showPageNumbers]="true"
      (pageChange)="onPageChange($event)"
      (itemsPerPageChange)="onItemsPerPageChange($event)">
    </app-pagination>

  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════════════ -->
<!-- Cell Templates                                                        -->
<!-- ══════════════════════════════════════════════════════════════════════ -->

<!-- Book Cell -->
<ng-template #bookCell let-row>
  <div class="flex items-center gap-3">
    <div class="w-10 h-10 rounded-xl flex items-center justify-center bg-gradient-to-br from-teal-100 to-cyan-100 border border-teal-200 dark:border-teal-800 flex-shrink-0">
      <mat-icon class="text-teal-600 dark:text-teal-400 icon-size-5">menu_book</mat-icon>
    </div>
    <div class="min-w-0">
      <p class="text-sm font-semibold text-gray-900 dark:text-white truncate">{{ row.bookTitle }}</p>
      <p class="text-xs text-gray-400 dark:text-gray-500 truncate">ID: {{ row.bookId | slice:0:8 }}…</p>
    </div>
  </div>
</ng-template>

<!-- Member Cell -->
<ng-template #memberCell let-row>
  <div class="flex items-center gap-2">
    <div class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-100 to-violet-100 border border-indigo-200 dark:border-indigo-700 flex items-center justify-center flex-shrink-0">
      <mat-icon class="text-indigo-500 icon-size-4">badge</mat-icon>
    </div>
    <span class="text-sm text-gray-700 dark:text-gray-300">{{ row.memberName || '—' }}</span>
  </div>
</ng-template>

<!-- Date Cell -->
<ng-template #dateCell let-row>
  <div class="flex items-center gap-1.5 text-sm text-gray-600 dark:text-gray-400">
    <mat-icon class="icon-size-4 text-gray-400">calendar_today</mat-icon>
    {{ row.reservedOn | date:'mediumDate' }}
  </div>
</ng-template>

<!-- Status Cell -->
<ng-template #statusCell let-row>
  <span
    class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold"
    [ngClass]="{
      'bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400':  row.isFulfilled,
      'bg-amber-100 dark:bg-amber-900/30 text-amber-700 dark:text-amber-400': !row.isFulfilled
    }">
    <mat-icon class="icon-size-3">{{ row.isFulfilled ? 'check_circle' : 'pending' }}</mat-icon>
    {{ row.isFulfilled ? 'Fulfilled' : 'Pending' }}
  </span>
</ng-template>

<!-- School Cell (SuperAdmin only) -->
<ng-template #schoolCell let-row>
  <div class="flex items-center gap-2">
    <mat-icon class="icon-size-4 text-violet-500 dark:text-violet-400">school</mat-icon>
    <span class="text-sm text-gray-700 dark:text-gray-300">{{ row.schoolName || '—' }}</span>
  </div>
</ng-template>
