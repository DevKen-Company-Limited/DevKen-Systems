<div class="absolute inset-0 flex min-w-0 flex-col overflow-y-auto" cdkScrollable>

  <!-- Page Header -->
  <app-page-header
    title="Library Branches"
    description="Manage library branch locations and their book inventory"
    icon="store"
    [breadcrumbs]="breadcrumbs"
    [actionTemplate]="headerActions">
  </app-page-header>

  <ng-template #headerActions>
    <button mat-flat-button
      class="bg-white text-teal-700 hover:bg-yellow-200 hover:text-teal-900 shadow-lg transition-all hover:shadow-xl font-bold"
      (click)="openCreate()">
      <mat-icon class="icon-size-5">add</mat-icon>
      <span class="ml-2">Add Branch</span>
    </button>
  </ng-template>

  <!-- Main Content -->
  <div class="bg-card -mt-10 flex-auto rounded-t-2xl p-6 shadow sm:p-10">

    <app-stats-cards [cards]="statsCards" [columns]="4"></app-stats-cards>

    <div class="mb-6">
      <app-filter-panel
        [fields]="filterFields"
        [showPanel]="showFilterPanel"
        [columns]="3"
        (filterChange)="onFilterChange($event)"
        (clearAll)="onClearFilters()"
        (togglePanel)="toggleFilterPanel()">
      </app-filter-panel>
    </div>

    <app-data-table
      [columns]="tableColumns"
      [data]="paginatedData"
      [actions]="tableActions"
      [loading]="isLoading"
      [header]="tableHeader"
      [emptyState]="tableEmptyState"
      [cellTemplates]="cellTemplates">
    </app-data-table>

    <app-pagination
      *ngIf="!isLoading"
      [currentPage]="currentPage"
      [totalItems]="filteredData.length"
      [itemsPerPage]="itemsPerPage"
      [itemLabel]="'branches'"
      [showItemsPerPageSelector]="true"
      [showPageNumbers]="true"
      (pageChange)="onPageChange($event)"
      (itemsPerPageChange)="onItemsPerPageChange($event)">
    </app-pagination>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════════════ -->
<!-- Cell Templates                                                        -->
<!-- ══════════════════════════════════════════════════════════════════════ -->

<!-- Name Cell -->
<ng-template #nameCell let-row>
  <div class="flex items-center gap-3">
    <div class="w-10 h-10 rounded-xl flex items-center justify-center bg-gradient-to-br from-teal-100 to-emerald-100 border border-teal-200 dark:border-teal-800 flex-shrink-0">
      <mat-icon class="text-teal-600 dark:text-teal-400 icon-size-5">store</mat-icon>
    </div>
    <div>
      <p class="text-sm font-semibold text-gray-900 dark:text-white">{{ row.name }}</p>
      <p class="text-xs text-gray-400 dark:text-gray-500">Branch</p>
    </div>
  </div>
</ng-template>

<!-- Location Cell -->
<ng-template #locationCell let-row>
  <div class="flex items-center gap-2" *ngIf="row.location; else noLocation">
    <mat-icon class="icon-size-4 text-gray-500 dark:text-gray-400">location_on</mat-icon>
    <span class="text-sm text-gray-700 dark:text-gray-300">{{ row.location }}</span>
  </div>
  <ng-template #noLocation>
    <span class="text-sm text-gray-400 italic">—</span>
  </ng-template>
</ng-template>

<!-- Copies Cell -->
<ng-template #copiesCell let-row>
  <div class="flex flex-col items-center gap-1">
    <span class="px-3 py-1 rounded-full text-xs font-semibold inline-flex items-center gap-1"
      [ngClass]="{
        'bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400': row.availableCopies > 0,
        'bg-gray-100  dark:bg-gray-700      text-gray-500  dark:text-gray-400':  row.availableCopies === 0
      }">
      <mat-icon class="icon-size-3">library_books</mat-icon>
      {{ row.availableCopies }} / {{ row.totalCopies }}
    </span>
    <span class="text-xs text-gray-400 dark:text-gray-500">available</span>
  </div>
</ng-template>

<!-- School Cell (SuperAdmin only) -->
<ng-template #schoolCell let-row>
  <div class="flex items-center gap-2">
    <mat-icon class="icon-size-4 text-violet-600 dark:text-violet-400">school</mat-icon>
    <span class="text-sm text-gray-700 dark:text-gray-300">{{ row.schoolName || '—' }}</span>
  </div>
</ng-template>
