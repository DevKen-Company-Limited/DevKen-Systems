<div class="flex items-center justify-between p-3 mb-2 rounded-xl border border-indigo-100 bg-white dark:bg-gray-800 dark:border-gray-700 shadow-sm hover:shadow-md transition-shadow animate-in slide-in-from-right-2 duration-300">
      <div class="flex items-center gap-3 min-w-0">
        <div class="w-10 h-10 rounded-lg flex items-center justify-center shrink-0 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400">
          <mat-icon>book</mat-icon>
        </div>
        
        <div class="min-w-0">
          <p class="text-sm font-bold text-gray-900 dark:text-white truncate">
            {{ copy.bookTitle }}
          </p>
          <div class="flex items-center gap-2 text-[11px] text-gray-500 font-mono">
            <span class="bg-gray-100 dark:bg-gray-700 px-1.5 py-0.5 rounded">{{ copy.accessionNumber }}</span>
            <span *ngIf="copy.barcode" class="italic">#{{ copy.barcode }}</span>
          </div>
        </div>
      </div>

      <button mat-icon-button color="warn" (click)="onRemove.emit(copy.id)" matTooltip="Remove from selection">
        <mat-icon class="icon-size-5">delete_outline</mat-icon>
      </button>
    </div>
