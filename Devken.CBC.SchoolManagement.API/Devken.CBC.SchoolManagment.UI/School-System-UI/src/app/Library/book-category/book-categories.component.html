<div class="absolute inset-0 flex min-w-0 flex-col overflow-y-auto" cdkScrollable>

  <app-page-header
    title="Book Categories"
    description="Manage all book categories in the library"
    icon="category"
    [breadcrumbs]="breadcrumbs"
    [actionTemplate]="headerActions">
  </app-page-header>

  <ng-template #headerActions>
    <button mat-flat-button
      class="bg-white text-violet-700 hover:bg-yellow-200 hover:text-violet-900 shadow-lg transition-all hover:shadow-xl font-bold"
      (click)="openCreate()">
      <mat-icon class="icon-size-5">add</mat-icon>
      <span class="ml-2">Add Category</span>
    </button>
  </ng-template>

  <div class="flex flex-col flex-auto p-4 sm:p-6 gap-4 overflow-y-auto bg-gray-50 dark:bg-gray-900">

    <app-stats-cards [cards]="statsCards" [columns]="2"></app-stats-cards>

    <app-filter-panel
      [fields]="filterFields"
      [showPanel]="showFilters"
      [columns]="2"
      (filterChange)="onFilterChange($event)"
      (clearAll)="onClearFilters()"
      (togglePanel)="showFilters = !showFilters">
    </app-filter-panel>

    <app-data-table
      [columns]="tableColumns"
      [data]="paginatedData"
      [actions]="tableActions"
      [loading]="isLoading"
      [header]="tableHeader"
      [emptyState]="emptyState"
      [cellTemplates]="cellTemplates"
      (rowClick)="onRowClick($event)"
      (columnHeaderClick)="onColumnHeaderClick($event)">

      <ng-template #nameCell let-row>
        <div class="flex flex-col">
          <span class="text-sm font-semibold text-gray-900 dark:text-white">{{ row.name }}</span>
          <span *ngIf="row.schoolName" class="text-xs text-gray-400">{{ row.schoolName }}</span>
        </div>
      </ng-template>

      <ng-template #descCell let-row>
        <span class="text-sm text-gray-600 dark:text-gray-400 line-clamp-2">
          {{ row.description || '—' }}
        </span>
      </ng-template>

    </app-data-table>

    <app-pagination
      *ngIf="filteredData.length > 0"
      [currentPage]="currentPage"
      [totalItems]="filteredData.length"
      [itemsPerPage]="itemsPerPage"
      [showItemsPerPageSelector]="true"
      [itemsPerPageOptions]="[10, 25, 50]"
      [showPageNumbers]="true"
      itemLabel="categories"
      (pageChange)="onPageChange($event)"
      (itemsPerPageChange)="onItemsPerPageChange($event)">
    </app-pagination>

  </div>
</div>
