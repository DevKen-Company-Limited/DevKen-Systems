<!-- book-recommendation/book-recommendations.component.html -->

<div class="absolute inset-0 flex min-w-0 flex-col overflow-y-auto" cdkScrollable>

  <!-- Page Header -->
  <app-page-header
    title="Book Recommendations"
    description="Manage personalized book recommendations for students"
    icon="stars"
    [breadcrumbs]="breadcrumbs"
    [actionTemplate]="headerActions">
  </app-page-header>

  <ng-template #headerActions>
    <button mat-flat-button
      class="bg-white text-amber-700 hover:bg-yellow-200 hover:text-amber-900 shadow-lg transition-all font-bold"
      (click)="openCreate()">
      <mat-icon class="icon-size-5">add</mat-icon>
      <span class="ml-2">New Recommendation</span>
    </button>
  </ng-template>

  <!-- Main Content -->
  <div class="bg-card -mt-10 flex-auto rounded-t-2xl p-6 shadow sm:p-10">

    <app-stats-cards [cards]="statsCards" [columns]="4"></app-stats-cards>

    <div class="mb-6">
      <app-filter-panel
        [fields]="filterFields"
        [showPanel]="showFilterPanel"
        [columns]="3"
        (filterChange)="onFilterChange($event)"
        (clearAll)="onClearFilters()"
        (togglePanel)="toggleFilterPanel()">
      </app-filter-panel>
    </div>

    <app-data-table
      [columns]="tableColumns"
      [data]="paginatedData"
      [actions]="tableActions"
      [loading]="isLoading"
      [header]="tableHeader"
      [emptyState]="tableEmptyState"
      [cellTemplates]="cellTemplates">
    </app-data-table>

    <app-pagination
      *ngIf="!isLoading"
      [currentPage]="currentPage"
      [totalItems]="filteredData.length"
      [itemsPerPage]="itemsPerPage"
      [itemLabel]="'recommendations'"
      [showItemsPerPageSelector]="true"
      [showPageNumbers]="true"
      (pageChange)="onPageChange($event)"
      (itemsPerPageChange)="onItemsPerPageChange($event)">
    </app-pagination>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════════════ -->
<!-- Cell Templates                                                        -->
<!-- ══════════════════════════════════════════════════════════════════════ -->

<!-- Book Cell -->
<ng-template #bookCell let-row>
  <div class="flex items-center gap-3">
    <div class="w-10 h-10 rounded-xl flex items-center justify-center
                bg-gradient-to-br from-amber-100 to-orange-100
                border border-amber-200 dark:border-amber-800 flex-shrink-0">
      <mat-icon class="text-amber-600 dark:text-amber-400 icon-size-5">menu_book</mat-icon>
    </div>
    <div class="min-w-0">
      <p class="text-sm font-semibold text-gray-900 dark:text-white truncate">
        {{ row.bookTitle || '—' }}
      </p>
      <p *ngIf="row.authorName" class="text-xs text-gray-500 dark:text-gray-400 truncate">
        {{ row.authorName }}
      </p>
    </div>
  </div>
</ng-template>

<!-- Student Cell -->
<ng-template #studentCell let-row>
  <div class="flex items-center gap-2">
    <mat-icon class="icon-size-4 text-indigo-600 dark:text-indigo-400">person</mat-icon>
    <div class="min-w-0">
      <p class="text-sm text-gray-700 dark:text-gray-300 truncate">{{ row.studentName || '—' }}</p>
      <p *ngIf="row.studentNumber" class="text-xs text-gray-500 dark:text-gray-400 font-mono">
        {{ row.studentNumber }}
      </p>
    </div>
  </div>
</ng-template>

<!-- Score Cell -->
<ng-template #scoreCell let-row>
  <div class="flex flex-col items-center gap-1">
    <span class="px-3 py-1.5 rounded-full text-sm font-bold inline-flex items-center gap-1.5"
          [ngClass]="getScoreColor(row.score)">
      <mat-icon class="icon-size-4">{{ getScoreIcon(row.score) }}</mat-icon>
      {{ row.score }}%
    </span>
  </div>
</ng-template>

<!-- Reason Cell -->
<ng-template #reasonCell let-row>
  <div class="max-w-md">
    <p class="text-sm text-gray-700 dark:text-gray-300 line-clamp-2">
      {{ truncateText(row.reason, 120) }}
    </p>
  </div>
</ng-template>

<!-- School Cell (SuperAdmin only) -->
<ng-template #schoolCell let-row>
  <div class="flex items-center gap-2">
    <mat-icon class="icon-size-4 text-violet-600 dark:text-violet-400">school</mat-icon>
    <span class="text-sm text-gray-700 dark:text-gray-300">{{ row.schoolName || '—' }}</span>
  </div>
</ng-template>
